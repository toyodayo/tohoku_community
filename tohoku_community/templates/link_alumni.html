{% extends "base.html" %}
{% block title %}卒業後アカウント連携{% endblock %}
{% block content %}
<h4>卒業後も使い続けるためのアカウント連携</h4>
<p class="text-muted">
  卒業後に大学のGoogleアカウントが失効しても利用を続けられるよう、
  個人のメールアドレスを連携できます。
</p>
<form method="post" class="col-md-5">
  <div class="mb-3">
    <label class="form-label">連携するメールアドレス</label>
    <input type="email" class="form-control" name="alumni_email"
           value="{{ current_user.alumni_email or '' }}" required>
  </div>
  <button class="btn tu-btn">連携する</button>
</form>

{% if current_user.alumni_email %}
<p class="mt-3">現在連携中のメールアドレス: <strong>{{ current_user.alumni_email }}</strong></p>
{% endif %}
{% endblock %}
