{% extends "base.html" %}
{% block title %}匿名掲示板{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">匿名チャットモード</h4>
  <button class="btn tu-btn btn-sm" data-bs-toggle="modal" data-bs-target="#newThreadModal">＋ 新しいスレッド</button>
</div>
<p class="text-muted small">直近1時間の書き込みが多いスレッド順に表示されています。</p>

<div class="list-group">
  {% for thread, recent_count in ranked %}
  <a href="{{ url_for('anonymous.thread_detail', thread_id=thread.id) }}"
     class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
    <span>{{ thread.title }}</span>
    <span class="badge tu-badge">直近1時間 {{ recent_count }}件</span>
  </a>
  {% else %}
  <p class="text-muted">まだスレッドがありません。最初のスレッドを立ててみましょう。</p>
  {% endfor %}
</div>

<div class="modal fade" id="newThreadModal" tabindex="-1">
  <div class="modal-dialog">
    <form method="post" action="{{ url_for('anonymous.create_thread') }}" class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">新しいスレッド</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-2">
          <input class="form-control" name="title" placeholder="スレッドタイトル" required>
        </div>
        <div class="mb-2">
          <textarea class="form-control" name="content" rows="3" placeholder="本文（匿名で投稿されます）" required></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn tu-btn">投稿する</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
